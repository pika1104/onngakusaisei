<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>YouTubeś§úÁīĘ</title>
</head>
<body>

<h1>YouTubeś§úÁīĘ</h1>

<input id="search" placeholder="ś§úÁīĘ„ÉĮ„Éľ„ÉČ">
<button onclick="searchYouTube()">ś§úÁīĘ</button>

<div id="results"></div>
<div id="error" style="color:red;"></div>

<script>
const API_KEY = "AIzaSyDlSA0xhESnwUxIGswBpF47r7Ti6X7vFIs";

async function searchYouTube() {
  document.getElementById("error").innerText = "";

  try {
    const query = document.getElementById("search").value;

    const res = await fetch(
      "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=5&q=" 
      + encodeURIComponent(query) 
      + "&key=" + API_KEY
    );

    const data = await res.json();

    if (!data.items) {
      throw new Error(JSON.stringify(data));
    }

    const results = document.getElementById("results");
    results.innerHTML = "";

    data.items.forEach(item => {
      const videoId = item.id.videoId;

      const div = document.createElement("div");

      div.innerHTML = `
        <p>${item.snippet.title}</p>
        <iframe width="300" height="170"
          src="https://www.youtube.com/embed/${videoId}"
          frameborder="0" allowfullscreen>
        </iframe>
      `;

      results.appendChild(div);
    });

  } catch (e) {
    document.getElementById("error").innerText = "„ā®„É©„Éľ: " + e.message;
  }
}
</script>

</body>
</html>
