<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>YouTubeプレイヤー</title>
</head>
<body>

<h1>YouTube検索</h1>

<input id="search" placeholder="検索ワード">
<button onclick="searchYouTube()">検索</button>

<div id="results"></div>
<div id="error" style="color:red;"></div>

<script>
const API_KEY = "AIzaSyDlSA0xhESnwUxIGswBpF47r7Ti6X7vFIs";

async function searchYouTube() {
  const errorDiv = document.getElementById("error");
  errorDiv.innerText = "";

  try {
    const query = document.getElementById("search").value;

    const res = await fetch(
      "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=5&q=" 
      + encodeURIComponent(query) 
      + "&key=" + API_KEY
    );

    if (!res.ok) {
      throw new Error("HTTPエラー: " + res.status);
    }

    const data = await res.json();

    if (!data.items) {
      throw new Error(JSON.stringify(data));
    }

    const results = document.getElementById("results");
    results.innerHTML = "";

    data.items.forEach(item => {
      const videoId = item.id.videoId;

      const div = document.createElement("div");

      div.innerHTML = `
        <p>${item.snippet.title}</p>
        <iframe width="300" height="170"
          src="https://www.youtube.com/embed/${videoId}">
        </iframe>
      `;

      results.appendChild(div);
    });

  } catch (e) {
    errorDiv.innerText = "エラー: " + e.message;
  }
}
</script>

</body>
</html>
