<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>YouTubeプレイヤー 完全版</title>

<style>
body {
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

/* 入力 */
input {
  padding:10px;
  width:60%;
  max-width:400px;
}

button {
  margin:5px;
  padding:8px 12px;
  cursor:pointer;
}

/* 動画枠（レスポンシブ） */
.player-wrapper {
  position: relative;
  width: 100%;
  max-width: 800px;
  margin: 10px auto;
}

.player-wrapper::before {
  content: "";
  display: block;
  padding-top: 56.25%;
}

.player-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* リスト */
.video {
  margin:15px;
}
</style>

</head>
<body>

<h1>🎵 YouTubeプレイヤー</h1>

<input id="search" placeholder="検索ワード">
<button id="searchBtn">検索</button>

<h2>検索結果</h2>
<div id="results"></div>

<h2>プレイリスト</h2>
<div id="playlist"></div>

<h2>再生</h2>
<div class="player-wrapper">
  <iframe id="player" src="" allowfullscreen></iframe>
</div>

<div id="error" style="color:red;"></div>

<script>
const API_KEY = "AIzaSyDlSA0xhESnwUxIGswBpF47r7Ti6X7vFIs";

let playlist = [];

// 検索ボタン
document.getElementById("searchBtn").addEventListener("click", searchYouTube);

// 検索処理
async function searchYouTube() {
  const errorDiv = document.getElementById("error");
  errorDiv.innerText = "";

  try {
    const query = document.getElementById("search").value;
    if (!query) return;

    const res = await fetch(
      "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=5&q=" 
      + encodeURIComponent(query) 
      + "&key=" + API_KEY
    );

    if (!res.ok) {
      throw new Error("HTTPエラー: " + res.status);
    }

    const data = await res.json();

    if (!data.items) {
      throw new Error(JSON.stringify(data));
    }

    const results = document.getElementById("results");
    results.innerHTML = "";

    data.items.forEach(item => {
      const videoId = item.id.videoId;
      const title = item.snippet.title;

      const div = document.createElement("div");
      div.className = "video";

      const p = document.createElement("p");
      p.innerText = title;

      const btn = document.createElement("button");
      btn.innerText = "➕ 追加";
      btn.onclick = () => addToPlaylist(videoId, title);

      div.appendChild(p);
      div.appendChild(btn);
      results.appendChild(div);
    });

  } catch (e) {
    errorDiv.innerText = "エラー: " + e.message;
  }
}

// プレイリスト追加
function addToPlaylist(id, title) {
  playlist.push({ id, title });
  renderPlaylist();
}

// 表示更新
function renderPlaylist() {
  const list = document.getElementById("playlist");
  list.innerHTML = "";

  playlist.forEach((item, index) => {
    const div = document.createElement("div");

    const text = document.createElement("span");
    text.innerText = (index + 1) + ". " + item.title;

    const playBtn = document.createElement("button");
    playBtn.innerText = "▶️";
    playBtn.onclick = () => playVideo(item.id);

    const delBtn = document.createElement("button");
    delBtn.innerText = "❌";
    delBtn.onclick = () => removeVideo(index);

    div.appendChild(text);
    div.appendChild(playBtn);
    div.appendChild(delBtn);

    list.appendChild(div);
  });
}

// 再生
function playVideo(id) {
  document.getElementById("player").src =
    "https://www.youtube.com/embed/" + id;
}

// 削除
function removeVideo(index) {
  playlist.splice(index, 1);
  renderPlaylist();
}
</script>

</body>
</html>
