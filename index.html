<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>YouTubeプレイヤー 自動再生</title>

<style>
body {
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

input {
  padding:10px;
  width:60%;
  max-width:400px;
}

button {
  margin:5px;
  padding:8px 12px;
}

.player-wrapper {
  position: relative;
  width: 100%;
  max-width: 800px;
  margin: 10px auto;
}

.player-wrapper::before {
  content: "";
  display: block;
  padding-top: 56.25%;
}

.player-wrapper iframe {
  position: absolute;
  width: 100%;
  height: 100%;
  top:0;
  left:0;
}
</style>

</head>
<body>

<h1>🎵 自動再生プレイヤー</h1>

<input id="search" placeholder="検索ワード">
<button onclick="searchYouTube()">検索</button>

<h2>検索結果</h2>
<div id="results"></div>

<h2>プレイリスト</h2>
<div id="playlist"></div>

<h2>再生</h2>
<div class="player-wrapper">
  <div id="player"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const API_KEY = "AIzaSyDlSA0xhESnwUxIGswBpF47r7Ti6X7vFIs";

let playlist = JSON.parse(localStorage.getItem("playlist")) || [];
let currentIndex = 0;
let player;

// 初期表示
renderPlaylist();

// YouTube API準備
function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '100%',
    width: '100%',
    events: {
      'onStateChange': onPlayerStateChange
    }
  });
}

// 再生終了検知
function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.ENDED) {
    nextVideo();
  }
}

// 次の曲
function nextVideo() {
  if (playlist.length === 0) return;

  currentIndex++;
  if (currentIndex >= playlist.length) {
    currentIndex = 0; // ループ
  }

  playVideo(playlist[currentIndex].id);
}

// 検索
async function searchYouTube() {
  const query = document.getElementById("search").value;
  if (!query) return;

  const res = await fetch(
    "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=5&q=" 
    + encodeURIComponent(query) 
    + "&key=" + API_KEY
  );

  const data = await res.json();
  const results = document.getElementById("results");
  results.innerHTML = "";

  data.items.forEach(item => {
    const videoId = item.id.videoId;
    const title = item.snippet.title;

    const div = document.createElement("div");

    const p = document.createElement("p");
    p.innerText = title;

    const btn = document.createElement("button");
    btn.innerText = "➕ 追加";
    btn.onclick = () => addToPlaylist(videoId, title);

    div.appendChild(p);
    div.appendChild(btn);
    results.appendChild(div);
  });
}

// 追加
function addToPlaylist(id, title) {
  playlist.push({ id, title });
  savePlaylist();
  renderPlaylist();
}

// 保存
function savePlaylist() {
  localStorage.setItem("playlist", JSON.stringify(playlist));
}

// 表示
function renderPlaylist() {
  const list = document.getElementById("playlist");
  list.innerHTML = "";

  playlist.forEach((item, index) => {
    const div = document.createElement("div");

    const text = document.createElement("span");
    text.innerText = (index + 1) + ". " + item.title;

    const playBtn = document.createElement("button");
    playBtn.innerText = "▶️";
    playBtn.onclick = () => {
      currentIndex = index;
      playVideo(item.id);
    };

    const delBtn = document.createElement("button");
    delBtn.innerText = "❌";
    delBtn.onclick = () => removeVideo(index);

    div.appendChild(text);
    div.appendChild(playBtn);
    div.appendChild(delBtn);

    list.appendChild(div);
  });
}

// 再生
function playVideo(id) {
  player.loadVideoById(id);
}

// 削除
function removeVideo(index) {
  playlist.splice(index, 1);
  savePlaylist();
  renderPlaylist();
}
</script>

</body>
</html>
