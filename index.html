<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>YouTubeプレイヤー</title>
<style>
body { background:#111; color:white; font-family:sans-serif; text-align:center; }
.video { margin:10px; }
button { margin:5px; padding:5px 10px; }
iframe { width:300px; height:170px; }
</style>
</head>
<body>

<h1>🎵 YouTubeプレイリスト</h1>

<input id="search" placeholder="検索ワード">
<button onclick="searchYouTube()">検索</button>

<h2>検索結果</h2>
<div id="results"></div>

<h2>プレイリスト</h2>
<div id="playlist"></div>

<h2>再生</h2>
<iframe id="player" src="" allowfullscreen></iframe>

<script>
const API_KEY = "
AIzaSyDlSA0xhESnwUxIGswBpF47r7Ti6X7vFIs";
let playlist = [];

async function searchYouTube() {
  const query = document.getElementById("search").value;

  const res = await fetch(
    "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=5&q=" 
    + encodeURIComponent(query) 
    + "&key=" + API_KEY
  );

  const data = await res.json();
  const results = document.getElementById("results");
  results.innerHTML = "";

  data.items.forEach(item => {
    const videoId = item.id.videoId;

    const div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <p>${item.snippet.title}</p>
      <button onclick="addToPlaylist('${videoId}', \`${item.snippet.title}\`)">➕ 追加</button>
    `;

    results.appendChild(div);
  });
}

function addToPlaylist(id, title) {
  playlist.push({ id, title });
  renderPlaylist();
}

function renderPlaylist() {
  const list = document.getElementById("playlist");
  list.innerHTML = "";

  playlist.forEach((item, index) => {
    const div = document.createElement("div");

    div.innerHTML = `
      ${index + 1}. ${item.title}
      <button onclick="playVideo('${item.id}')">▶️ 再生</button>
      <button onclick="removeVideo(${index})">❌</button>
    `;

    list.appendChild(div);
  });
}

function playVideo(id) {
  document.getElementById("player").src =
    "https://www.youtube.com/embed/" + id;
}

function removeVideo(index) {
  playlist.splice(index, 1);
  renderPlaylist();
}
</script>

</body>
</html>
