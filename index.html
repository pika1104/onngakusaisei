<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>YouTube検索</title>
</head>
<body>

<h1>YouTube検索</h1>

<input id="search" placeholder="検索ワード">
<button onclick="searchYouTube()">検索</button>

<div id="results"></div>

<script>
const API_KEY = "AIzaSyDlSA0xhESnwUxIGswBpF47r7Ti6X7vFIs";

async function searchYouTube() {
  const query = document.getElementById("search").value;

  const res = await fetch(
    "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=5&q=" 
    + encodeURIComponent(query) 
    + "&key=" + API_KEY
  );

  const data = await res.json();

  console.log(data); // ←これ追加（確認用）

  const results = document.getElementById("results");
  results.innerHTML = "";

  data.items.forEach(item => {
    const videoId = item.id.videoId;

    const div = document.createElement("div");

    div.innerHTML = `
      <p>${item.snippet.title}</p>
      <iframe width="300" height="170"
        src="https://www.youtube.com/embed/${videoId}"
        frameborder="0" allowfullscreen>
      </iframe>
    `;

    results.appendChild(div);
  });
}
</script>

</body>
</html>
